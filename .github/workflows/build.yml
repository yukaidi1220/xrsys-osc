# 开发版构建工作流：每次推送或 PR 时自动构建，用于持续集成
name: 开发版构建

on:
  workflow_dispatch:   # 支持手动触发
  push:
    paths-ignore:      # 以下文件变更时不触发构建
      - '.github/**'   # 工作流文件本身的变更
      - '*.md'         # 文档文件的变更
  pull_request:
    paths-ignore:      # PR 涉及以下路径时不触发构建
      - '.github/**'
      - '*.md'

jobs:
  build:
    runs-on: windows-latest   # 使用最新的 Windows 运行器（兼容 NSIS 和 Windows 工具链）
    steps:
    - name: 检出仓库
      uses: actions/checkout@v6

    # - name: 更改 DNS 服务器
