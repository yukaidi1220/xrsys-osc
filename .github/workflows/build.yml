    #     foreach ($adapter in $networkAdapters) {
    #         Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ResetServerAddresses
    #         Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ServerAddresses $newDnsServers
    #     }
    #     ipconfig /flushdns

    # - name: 安装 Cloudflare WARP
    #   shell: pwsh
    #   run: |
    #     Write-Host "正在安装 Cloudflare WARP..."
    #     Invoke-WebRequest -Uri "https://1111-releases.cloudflareclient.com/win/latest" -OutFile "C:\cfwarp.msi"
    #     Start-Process "msiexec.exe" -ArgumentList "/i C:\cfwarp.msi /qn" -Wait
    #     Set-Location "C:\Program Files\Cloudflare\Cloudflare WARP"
    #     .\warp-cli.exe registration new
    #     .\warp-cli.exe connect
    #     # 循环等待连接状态
    #     for ($attemptCount = 0; $attemptCount -lt 10; $attemptCount++) {
    #         $output = .\warp-cli.exe status
    #         Write-Host $output
    #         if ($output -like "*Status update: Connected*") {
    #             break
    #         }
    #         Start-Sleep -Seconds 5  # 等待 5 秒后重试
    #     }
    #     if ($attemptCount -eq 10) {
    #         Write-Host "连接失败，已重试 10 次。"
    #         exit 1  # 退出并返回错误码
    #     }

    # 根据当前日期时间自动生成版本号（格式: YY.M.D.HHmm）
    - name: 根据当前日期时间生成版本号
      id: generate_version
      shell: pwsh
      run: |
        # 使用中国标准时间
        Set-TimeZone -Id "China Standard Time" -PassThru
        $date = Get-Date
        # 提取年份后两位、月、日、时、分
        $year = $date.Year.ToString().Substring(2)
        $month = $date.Month.ToString("0")
        $day = $date.Day.ToString("0")
        $hour = $date.Hour.ToString("0")
        $minute = $date.Minute.ToString("0")
        # 拼接版本号（如 26.6.4.1430）
        $version = "$year.$month.$day.$hour$minute"
        echo "版本号: $version"
        echo $PSVersionTable
        echo $GITHUB_OUTPUT
        # 将版本号输出到 GitHub Actions 上下文，供后续步骤使用
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # 通过 Chocolatey 包管理器安装 NSIS 打包工具
    - name: 安装 NSIS
      shell: pwsh
      run: |
        Write-Host "正在安装 NSIS..."
        choco install nsis -y

    # 执行 build.ps1 脚本：下载依赖文件、校验哈希、调用 NSIS 编译安装包
    - name: 构建 XROSC
      shell: pwsh
      env:
        GITHUB_WORKFLOW_VERSION: ${{ steps.generate_version.outputs.version }}
      run: |
        . .\build.ps1

    # - name: 断开 Cloudflare WARP
    #   shell: pwsh
    #   run: |
    #     Set-Location "C:\Program Files\Cloudflare\Cloudflare WARP"
    #     .\warp-cli.exe disconnect

    # 将构建产物（安装包、版本文件、校验文件）上传为 GitHub Artifact
    - name: 上传构建产物
      uses: actions/upload-artifact@v6
      with:
        name: XRSYS_OSC_开发版_v${{ steps.generate_version.outputs.version }}
        # osc.exe       — NSIS 编译生成的安装包
        # osc.exe.ver   — 版本号文件
        # osc.exe.sha256 — SHA256 校验文件
        # osc.exe.md5   — MD5 校验文件
        path: |
            osc.exe
            osc.exe.ver
            osc.exe.sha256
            osc.exe.md5
        compression-level: 0  # 不压缩（安装包本身已压缩）
